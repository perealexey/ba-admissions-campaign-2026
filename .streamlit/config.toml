# Тема дашборда — та же, что настраивалась локально через флаги
# --theme.* в summer_campaign_26/.claude/launch.json (только для preview-
# инструмента, Streamlit Cloud их не видит). Этот файл — единственный способ
# донести те же цвета до задеплоенного приложения, коммитится в репозиторий
# (не секрет, обычная конфигурация).
#
# backgroundColor = белый: нужен для тела таблиц (st.dataframe рисуется на
# canvas и берёт цвет из этой темы) — видимый синий фон САМОЙ СТРАНИЦЫ
# красится поверх через CSS в app.py (inject_theme()), см. комментарий там
# про то, почему нельзя одной переменной темы получить и то, и другое сразу.
[theme]
base = "light"
primaryColor = "#8B5CF6"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#C7E4FF"
textColor = "#000000"
